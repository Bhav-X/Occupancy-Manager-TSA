<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ... (Keep your original styles here) ... */
        /* Ensuring console-log visibility within admin panel */
        #console-log {
            margin-top: 15px;
            background: #1e1e1e;
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.8rem;
            min-height: 40px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #console-log.log-error { color: #ff4444; }
        #console-log.log-warn  { color: #f59e0b; }
    </style>
</head>
<body>
    <header>
        <h1>Smart Room Monitor</h1>
        <button id="admin-toggle" onclick="toggleAdmin()">🔒</button>
    </header>

    <div class="status-container">
        <div id="status-indicator" class="status-circle status-loading">
            <span id="status-word">...</span>
        </div>
        <div id="busy-timer"></div>
        <div class="status-text" id="status-label">Please wait...</div>
        <div class="sub-text" id="status-sub">Live Status</div>
        <div id="heartbeat-debug"></div>
    </div>

    <div id="system-notice">
        <div class="notice-title">⚠️ System Temporarily Unavailable</div>
        <div class="notice-body" id="notice-body">
            The room monitoring system is currently starting up or unreachable.
            Please check back in a moment.
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-header">Admin Controls</div>
        <input type="password" id="adminKey" placeholder="Enter Admin Key">

        <div class="grid-buttons">
            <button class="btn-green" onclick="runCmd('STATUS_CHANGE')">Toggle Status</button>
            <button class="btn-blue"  onclick="runCmd('ENROLL')">Enroll Finger</button>
        </div>

        <button class="btn-orange" style="width:100%; margin-bottom: 10px;" onclick="runCmd('CHECK_COUNT')">Check Count</button>

        <div class="delete-group">
            <input type="number" id="deleteIdInput" placeholder="ID#" min="1">
            <button class="btn-red" onclick="deleteSpecificId()">Delete ID</button>
        </div>

        <button class="btn-red"  style="width:100%; margin-bottom: 10px; opacity: 0.8;" onclick="confirmDeleteAll()">⚠️ Delete All DB</button>
        <button class="btn-grey" style="width:100%; margin-bottom: 10px;" onclick="runCmd('REBOOT')">🔄 Reboot Device</button>

        <div id="console-log">> System Ready.</div>
    </div>

    <script>
        // ... (Keep your original logic) ...

        // Updated waitForESPResponse function to ensure logs appear in console-log
        async function waitForESPResponse(timeoutMs, key) {
            isWaiting = true;
            const start = Date.now();
            lastKnownResult = "";

            while (Date.now() - start < timeoutMs) {
                await sleep(1000);
                try {
                    const res = await fetch(`${RENDER_URL}/api/result`, {
                        headers: { "Authorization": `Bearer ${key}` }
                    });
                    if (!res.ok) continue;

                    const data = await res.json();
                    // Check for result in root or nested admin object
                    const result = data.result || (data.admin ? data.admin.result : null);

                    if (result && result !== "0" && result !== lastKnownResult) {
                        lastKnownResult = result;
                        const isErr = result.toLowerCase().includes("error") || result.toLowerCase().includes("wrong");
                        setLog("> " + result, isErr ? "error" : "normal");
                        if (result.includes("WRONG KEY")) shakeInput("adminKey");
                        isWaiting = false;
                        return;
                    }
                } catch (e) {}
            }
            setLog("> The device did not respond. It may be offline or busy.", "warn");
            isWaiting = false;
        }

        // ... (Rest of your functions) ...
    </script>
</body>
</html>
